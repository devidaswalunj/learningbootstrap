<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <section class="container">
        <div>
            <div class="row">
                <!-- contact form -->
                <div class="col-md-6 mt-3 mb-2 border border-secondary border-5 p-3">
                    <form class="container">
                        <div class="row">
                            <h2 class="mt-3 mb-3">Contact Form</h2>
                            <div class="col-md-6">
                                <div class="mb-3 ">
                                    <label for="exampleFormControlInput1" class="form-label">Enter first
                                        name</label>
                                    <input type="name" class="form-control " id="exampleFormControlInput1"
                                        placeholder="first name">
                                </div>
                                <div class="mb-3">
                                    <label for="exampleFormControlInput1" class="form-label">Enter mobile
                                        number</label>
                                    <input type="number" class="form-control" id="exampleFormControlInput1"
                                        placeholder="mobile number">
                                </div>
                                <select class="form-select mb-2" aria-label="Default select example">
                                    <option selected>Select your state</option>
                                    <option value="1">Maharashtra</option>
                                    <option value="2">Goa</option>
                                    <option value="3">Rajsthan</option>
                                </select>
                                <div class="mb-3">
                                    <label for="exampleFormControlTextarea1" class="form-label">Enter your
                                        address</label>
                                    <textarea class="form-control" id="exampleFormControlTextarea1"
                                        placeholder="Address" rows="3"></textarea>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="exampleFormControlInput1" class="form-label">Enter last name</label>
                                    <input type="name" class="form-control" id="exampleFormControlInput1"
                                        placeholder="last name">
                                </div>
                                <div class="mb-3">
                                    <label for="exampleFormControlInput1" class="form-label">Email address</label>
                                    <input type="email" class="form-control" id="exampleFormControlInput1"
                                        placeholder="gmail.com">
                                </div>
                                <select class="form-select mb-2" aria-label="Default select example">
                                    <option selected>Select your city</option>
                                    <option value="1">Pune</option>
                                    <option value="2">Mumbai</option>
                                    <option value="3">Nagr</option>
                                </select>
                                <div class="mb-3">
                                    <label for="exampleFormControlTextarea1" class="form-label">Enter your
                                        Subject</label>
                                    <textarea class="form-control" id="exampleFormControlTextarea1"
                                        placeholder="Subject" rows="3"></textarea>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="formFile" class="form-label">select file(.)</label>
                                    <input class="form-control" type="file" id="formFile">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="row">
  <div class="col">
    <input type="text" class="form-control" placeholder="First name" aria-label="First name">
  </div>
  <div class="col">
    <input type="text" class="form-control" placeholder="Last name" aria-label="Last name">
  </div>
</div>
                            </div>
                            <div class="col-md-3"></div>
                            <div class="col-md-3"></div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <input class="btn btn-primary mb-3" type="submit" value="Submit">
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
